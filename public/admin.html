<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxySniffer - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #1e1e1e; 
            color: #d4d4d4; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 顶部工具栏 */
        .toolbar {
            background: #2d2d30;
            padding: 8px 16px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        
        .toolbar h1 {
            font-size: 14px;
            font-weight: 600;
            color: #569cd6;
            margin-right: 10px;
        }
        
        /* 代理服务状态 */
        .proxy-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.running {
            background: #4ec9b0;
            box-shadow: 0 0 8px #4ec9b0;
        }
        
        .status-dot.stopped {
            background: #f44747;
            box-shadow: 0 0 8px #f44747;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .proxy-actions {
            display: flex;
            gap: 6px;
        }
        
        .btn-proxy {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-start {
            background: #4ec9b0;
            color: #1e1e1e;
        }
        
        .btn-start:hover {
            background: #3db39a;
        }
        
        .btn-stop {
            background: #f44747;
            color: white;
        }
        
        .btn-stop:hover {
            background: #d43a3a;
        }
        
        .btn-proxy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 分组样式 */
        .group-header {
            padding: 8px 12px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #569cd6;
        }
        
        .group-header:hover {
            background: #3e3e42;
        }
        
        .group-header .arrow {
            transition: transform 0.2s;
        }
        
        .group-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        
        .group-count {
            color: #858585;
            font-size: 11px;
        }
        
        .group-items {
            /* 分组内的请求列表 */
        }
        
        .group-items.collapsed {
            display: none;
        }
        
        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 6px 12px 6px 32px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 6px;
            color: #d4d4d4;
            font-size: 13px;
        }
        
        .btn {
            padding: 6px 12px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        .btn:hover { background: #1177bb; }
        .btn-danger { background: #c72e2e; }
        .btn-danger:hover { background: #e51400; }
        
        /* 主容器 */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* 左侧请求列表 */
        .request-list {
            width: 450px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .list-header {
            padding: 8px 12px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-size: 12px;
            color: #858585;
            display: flex;
            justify-content: space-between;
        }
        
        .list-content {
            flex: 1;
            overflow-y: auto;
        }
        
        .request-item {
            padding: 10px 12px;
            border-bottom: 1px solid #2d2d30;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .request-item:hover { background: #2a2d2e; }
        .request-item.selected { background: #094771; }
        
        .method {
            font-weight: 600;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 8px;
            display: inline-block;
            min-width: 50px;
            text-align: center;
        }
        
        .method.GET { background: #61affe; color: white; }
        .method.POST { background: #49cc90; color: white; }
        .method.PUT { background: #fca130; color: white; }
        .method.DELETE { background: #f93e3e; color: white; }
        .method.HTTPS { background: #9c27b0; color: white; }
        
        .url {
            font-size: 13px;
            color: #d4d4d4;
            margin: 4px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .meta {
            font-size: 11px;
            color: #858585;
            display: flex;
            gap: 12px;
        }
        
        /* 右侧详情面板 */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .detail-tabs {
            display: flex;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            padding: 0 12px;
        }
        
        .tab {
            padding: 10px 16px;
            font-size: 12px;
            color: #858585;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab:hover { color: #d4d4d4; }
        .tab.active { color: #569cd6; border-bottom-color: #569cd6; }
        
        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-section h3 {
            font-size: 13px;
            color: #569cd6;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .detail-row {
            display: flex;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid #2d2d30;
        }
        
        .detail-label {
            width: 120px;
            color: #858585;
            flex-shrink: 0;
        }
        
        .detail-value {
            flex: 1;
            color: #d4d4d4;
            word-break: break-all;
        }
        
        pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        
        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #858585;
            font-size: 14px;
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .request-list { width: 350px; }
        }
        
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .request-list { 
                width: 100%; 
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid #3e3e42;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部工具栏 -->
    <div class="toolbar">
        <h1>🔶 ProxySniffer</h1>
        
        <!-- 代理服务状态 -->
        <div class="proxy-status">
            <div class="status-indicator">
                <div class="status-dot" id="proxy-status-dot"></div>
                <span id="proxy-status-text">检测中...</span>
            </div>
            <div class="proxy-actions">
                <button class="btn-proxy btn-start" id="proxy-start-btn" onclick="startProxyService()">启动</button>
                <button class="btn-proxy btn-stop" id="proxy-stop-btn" onclick="stopProxyService()">停止</button>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索 URL..." oninput="filterLogs()">
        </div>
        
        <button class="btn" onclick="refreshLogs()">🔄 刷新</button>
        <button class="btn btn-danger" onclick="clearLogs()">🗑️ 清空</button>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 左侧：请求列表 -->
        <div class="request-list">
            <div class="list-header">
                <span>请求列表</span>
                <span id="requestCount">0 items</span>
            </div>
            <div class="list-content" id="requestList">
                <div class="empty-state">
                    暂无请求，请启动代理服务
                </div>
            </div>
        </div>
        
        <!-- 右侧：详情面板 -->
        <div class="detail-panel">
            <div class="detail-tabs">
                <div class="tab active" onclick="switchTab('overview')">📊 Overview</div>
                <div class="tab" onclick="switchTab('request')">📤 Request</div>
                <div class="tab" onclick="switchTab('response')">📥 Response</div>
                <div class="tab" onclick="switchTab('raw')">📜 Raw Data</div>
            </div>
            <div class="detail-content" id="detailContent">
                <div class="empty-state">
                    选择一个请求查看详情
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let allLogs = [];
        let selectedIndex = -1;
        let currentTab = 'overview';
        let collapsedGroups = new Set();  // 记录折叠的分组
        let proxyRunning = false;
        
        // 检测代理服务状态
        async function checkProxyStatus() {
            try {
                // 正确方法：调用后端 API 检测端口状态
                const response = await fetch('/admin/api/service/status', { 
                    cache: 'no-cache'
                });
                const data = await response.json();
                
                proxyRunning = data.proxy.running;
                updateProxyStatus();
            } catch (e) {
                console.error('检测代理服务状态失败:', e);
                proxyRunning = false;
                updateProxyStatus();
            }
        }
        
        // 更新代理服务状态显示
        function updateProxyStatus() {
            const dot = document.getElementById('proxy-status-dot');
            const text = document.getElementById('proxy-status-text');
            const startBtn = document.getElementById('proxy-start-btn');
            const stopBtn = document.getElementById('proxy-stop-btn');
            
            if (proxyRunning) {
                dot.className = 'status-dot running';
                text.textContent = '代理服务运行中 (8888)';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                dot.className = 'status-dot stopped';
                text.textContent = '代理服务已停止';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        
        // 启动代理服务
        async function startProxyService() {
            try {
                const response = await fetch('/admin/api/service/proxy/start', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert('代理服务启动成功！');
                    setTimeout(checkProxyStatus, 2000);
                } else {
                    alert('启动失败：' + data.error);
                }
            } catch (e) {
                alert('启动失败：' + e.message);
            }
        }
        
        // 停止代理服务
        async function stopProxyService() {
            try {
                const response = await fetch('/admin/api/service/proxy/stop', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    alert('代理服务已停止');
                    setTimeout(checkProxyStatus, 2000);
                } else {
                    alert('停止失败：' + data.error);
                }
            } catch (e) {
                alert('停止失败：' + e.message);
            }
        }
        
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch('/admin/api/logs?limit=100');
                const data = await response.json();
                
                allLogs = data.logs || [];
                renderLogs();
                updateCount();
            } catch (e) {
                console.error('加载日志失败:', e);
            }
        }
        
        // 渲染日志列表（强制分组模式）
        function renderLogs() {
            const container = document.getElementById('requestList');
            
            if (allLogs.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无请求</div>';
                return;
            }
            
            // 先按时间倒序排序（最新的在前面）
            const sortedLogs = [...allLogs].sort((a, b) => {
                const timeA = new Date(a.timestamp || 0).getTime();
                const timeB = new Date(b.timestamp || 0).getTime();
                return timeB - timeA; // 倒序
            });
            
            // 按客户端 IP 分组
            const groups = {};
            sortedLogs.forEach((log, idx) => {
                const ip = log.clientIp || 'Unknown';
                if (!groups[ip]) groups[ip] = [];
                groups[ip].push({ log, idx: allLogs.indexOf(log) });
            });
            
            // 渲染分组
            container.innerHTML = Object.entries(groups).map(([ip, items]) => {
                const isCollapsed = collapsedGroups.has(ip);
                return `
                    <div class="group-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleGroup('${ip}')">
                        <span class="arrow">▼</span>
                        <span>客户端 IP: ${ip}</span>
                        <span class="group-count">(${items.length} 个请求)</span>
                    </div>
                    <div class="group-items ${isCollapsed ? 'collapsed' : ''}">
                        ${items.map(({ log, idx }) => `
                            <div class="request-item ${idx === selectedIndex ? 'selected' : ''}" onclick="selectLog(${idx})">
                                <div>
                                    <span class="method ${log.method}">${log.method}</span>
                                    <span class="url">${log.url}</span>
                                </div>
                                <div class="meta">
                                    <span>${log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : ''}</span>
                                    ${log.responseStatus ? `<span>Status: ${log.responseStatus}</span>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }
        
        // 切换分组折叠状态
        function toggleGroup(ip) {
            if (collapsedGroups.has(ip)) {
                collapsedGroups.delete(ip);
            } else {
                collapsedGroups.add(ip);
            }
            renderLogs();
        }
        
        // 选择日志
        function selectLog(idx) {
            selectedIndex = idx;
            renderLogs();
            renderDetail();
        }
        
        // 渲染详情
        function renderDetail() {
            const container = document.getElementById('detailContent');
            
            if (selectedIndex < 0 || selectedIndex >= allLogs.length) {
                container.innerHTML = '<div class="empty-state">选择一个请求查看详情</div>';
                return;
            }
            
            const log = allLogs[selectedIndex];
            
            if (currentTab === 'overview') {
                container.innerHTML = `
                    <div class="detail-section">
                        <h3>📊 概览</h3>
                        <div class="detail-row">
                            <div class="detail-label">方法</div>
                            <div class="detail-value"><span class="method ${log.method}">${log.method}</span></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">URL</div>
                            <div class="detail-value">${log.url}</div>
                        </div>
                        ${log.responseStatus ? `
                        <div class="detail-row">
                            <div class="detail-label">状态码</div>
                            <div class="detail-value">${log.responseStatus}</div>
                        </div>
                        ` : ''}
                        <div class="detail-row">
                            <div class="detail-label">时间</div>
                            <div class="detail-value">${log.timestamp ? new Date(log.timestamp).toLocaleString() : ''}</div>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'request') {
                container.innerHTML = `
                    <div class="detail-section">
                        <h3>📤 请求详情</h3>
                        <div class="detail-row">
                            <div class="detail-label">请求头</div>
                            <div class="detail-value">
                                <pre>${JSON.stringify(log.requestHeaders, null, 2)}</pre>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'response') {
                container.innerHTML = `
                    <div class="detail-section">
                        <h3>📥 响应详情</h3>
                        ${log.responseBody ? `
                        <div class="detail-row">
                            <div class="detail-label">响应体</div>
                            <div class="detail-value">
                                <pre>${log.responseBody.length > 5000 ? log.responseBody.substring(0, 5000) + '...' : log.responseBody}</pre>
                            </div>
                        </div>
                        ` : '<div class="empty-state">无响应数据</div>'}
                    </div>
                `;
            } else if (currentTab === 'raw') {
                container.innerHTML = `
                    <div class="detail-section">
                        <h3>📜 原始数据</h3>
                        <pre>${JSON.stringify(log, null, 2)}</pre>
                    </div>
                `;
            }
        }
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderDetail();
        }
        
        // 过滤日志
        function filterLogs() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            // 实现过滤逻辑
            renderLogs();
        }
        
        // 刷新日志
        function refreshLogs() {
            loadLogs();
            checkProxyStatus();
        }
        
        // 清空日志
        async function clearLogs() {
            if (!confirm('确定清空所有日志？')) return;
            
            try {
                const response = await fetch('/admin/api/logs/clear', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    allLogs = [];
                    renderLogs();
                    updateCount();
                }
            } catch (e) {
                console.error('清空日志失败:', e);
            }
        }
        
        // 更新计数
        function updateCount() {
            document.getElementById('requestCount').textContent = `${allLogs.length} items`;
        }
        
        // 初始化
        checkProxyStatus();
        loadLogs();
        
        // 定时刷新
        setInterval(checkProxyStatus, 5000);
        setInterval(loadLogs, 10000);
    </script>
</body>
</html>
