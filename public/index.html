<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理抓包管理端 - 修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 30px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .capture-list { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .capture-item { border-bottom: 1px solid #f3f4f6; padding: 15px 20px; cursor: pointer; }
        .capture-item:hover { background: #f9fafb; }
        .capture-item.expanded { background: #f9fafb; }
        .capture-header { display: flex; justify-content: space-between; align-items: center; }
        .capture-url { font-family: monospace; flex: 1; }
        .capture-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e5e7eb; }
        .capture-item.expanded .capture-details { display: block; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-primary { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 代理抓包管理端</h1>
    </div>
    <div class="container">
        <div class="capture-list" id="captureList"></div>
    </div>

    <script>
        let logs = [];
        
        // 加载日志
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                logs = data.logs || [];
                renderLogs();
            } catch (e) {
                console.error('加载失败:', e);
            }
        }
        
        // 渲染日志
        function renderLogs() {
            const list = document.getElementById('captureList');
            list.innerHTML = logs.map((log, idx) => `
                <div class="capture-item" data-idx="${idx}">
                    <div class="capture-header">
                        <span class="capture-url">${log.method || 'GET'} ${log.url || '(unknown)'}</span>
                    </div>
                    <div class="capture-details">
                        <pre>${JSON.stringify(log, null, 2)}</pre>
                    </div>
                </div>
            `).join('');
            
            // 绑定点击事件
            list.querySelectorAll('.capture-item').forEach(item => {
                item.addEventListener('click', function() {
                    this.classList.toggle('expanded');
                    console.log('Clicked item:', this.dataset.idx, 'Expanded:', this.classList.contains('expanded'));
                });
            });
        }
        
        // 初始化
        window.onload = function() {
            loadLogs();
            setInterval(loadLogs, 2000);
        };
    </script>
</body>
</html>
